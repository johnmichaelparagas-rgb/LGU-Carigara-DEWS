# Render Blueprint — provisions the web service + PostgreSQL database.
# In the Render dashboard: New → Blueprint, then point it at this repo.
services:
  - type: web
    name: carigara-dews
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn dews_portal.wsgi:application"
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true          # Render generates a strong secret
      - key: SEED_DEMO
        value: "1"                   # seed demo data on the first deploy; set to 0 afterwards
      - key: DATABASE_URL
        fromDatabase:
          name: carigara-dews-db
          property: connectionString

databases:
  - name: carigara-dews-db
    plan: free
    databaseName: carigara_dews
    user: carigara_dews
